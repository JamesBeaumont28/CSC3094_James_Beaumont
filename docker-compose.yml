version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: survey_data_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: survey_data_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpass
    ports:
      - "3306:3306"
    volumes:
      - tls_data:/var/lib/mysql

volumes:
  tls_data: